<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#ff7910" />
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Catamaran:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Catamaran:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap"
			rel="stylesheet"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Catamaran:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap"
				rel="stylesheet"
			/>
		</noscript>
		<!--
			Inlined so the page matches the app's dark theme from the very first
			paint, before app.css finishes loading — otherwise the browser's
			default white background flashes first on slower mobile connections.
		-->
		<style>
			html {
				background: #2b2b30;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
